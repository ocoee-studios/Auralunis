<!doctype html>
<html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chronaura Learn Live Visuals</title>
<style>
:root{--black:#0B0B12;--gold:#D4AF37;--gold2:#F6DC91;--silver:#C0C6D4;--muted:#8F99B3}
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--silver);background:radial-gradient(circle at 20% 0%,rgba(212,175,55,.16),transparent 30%),linear-gradient(180deg,#020208,#0B0B12)}
.wrap{width:min(1120px,calc(100% - 28px));margin:0 auto;padding:42px 0}
h1{font-size:clamp(42px,7vw,80px);line-height:.92;color:#fff;letter-spacing:-.075em;margin:0 0 10px} h1 span{color:var(--gold2);font-family:Georgia,serif;font-style:italic;font-weight:500}
p{color:var(--muted);line-height:1.55}
.badge{display:inline-flex;padding:9px 12px;border-radius:999px;border:1px solid rgba(212,175,55,.34);background:rgba(212,175,55,.1);color:var(--gold2);font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-weight:850}
.grid{display:grid;grid-template-columns:280px 1fr;gap:18px;margin-top:26px}
.sidebar,.panel{border-radius:28px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.08)}
.sidebar{padding:14px}.item{padding:12px;border-radius:18px;cursor:pointer;margin-bottom:8px}.item.active{background:rgba(212,175,55,.12);border:1px solid rgba(212,175,55,.28)} .item b{display:block;color:#fff}
.panel{padding:18px}.canvas{height:260px;border-radius:24px;background:rgba(5,7,13,.86);position:relative;overflow:hidden;margin:10px 0 14px}
.orbit{position:absolute;border:1px solid rgba(212,175,55,.18);border-radius:999px;left:50%;top:50%;transform:translate(-50%,-50%)} .sun{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:28px;height:28px;border-radius:14px;background:var(--gold2);box-shadow:0 0 18px rgba(212,175,55,.8)}
.dot{position:absolute;border-radius:999px}
.band{position:absolute;left:-20px;right:-20px;top:108px;height:46px;background:rgba(246,220,145,.16);border-radius:999px;transform:rotate(-12deg)}
.btns{display:flex;gap:10px;flex-wrap:wrap}.btn{padding:10px 12px;border-radius:999px;border:1px solid rgba(212,175,55,.28);background:rgba(212,175,55,.1);color:#fff;font-weight:700}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
</style></head><body>
<div class="wrap">
<span class="badge">Live Learn Visuals</span>
<h1>Learn tab, <span>brought to life.</span></h1>
<p>Each learning category now gets a dedicated visual module so the app feels like a living astronomy museum instead of a static lesson list.</p>
<div class="grid">
  <div class="sidebar" id="side"></div>
  <div class="panel">
    <div id="title" style="font-size:30px;font-weight:900;color:#fff"></div>
    <p id="desc"></p>
    <div class="canvas" id="canvas"></div>
    <div class="btns"><div class="btn">Open in Sky Lens</div><div class="btn">Open Archive Card</div><div class="btn">Save Lesson</div></div>
  </div>
</div>
</div>
<script>
const data = {
  solar_system:{title:"Solar System",desc:"A live mini-orrery for the Sun and orbiting planets.",render:()=>`
    <div class="sun"></div>
    <div class="orbit" style="width:84px;height:84px"></div>
    <div class="orbit" style="width:130px;height:130px"></div>
    <div class="orbit" style="width:178px;height:178px"></div>
    <div class="orbit" style="width:226px;height:226px"></div>
    <div class="dot" style="left:58%;top:48%;width:10px;height:10px;background:#F6DC91"></div>
    <div class="dot" style="left:37%;top:56%;width:9px;height:9px;background:#D0D8FF"></div>
    <div class="dot" style="left:66%;top:62%;width:10px;height:10px;background:#62CFFF"></div>
    <div class="dot" style="left:26%;top:40%;width:11px;height:11px;background:#FFB07A"></div>`},
  moon:{title:"Moon",desc:"A live moon-phase learning module.",render:()=>`
    <div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:118px;height:118px;border-radius:59px;background:#F2F4FF;overflow:hidden">
      <div style="position:absolute;right:0;top:0;bottom:0;width:36%;background:#0B0B12"></div>
    </div>`},
  planets:{title:"Planets",desc:"Use the live orrery to compare rocky worlds and giants.",render:()=> data.solar_system.render()},
  constellations:{title:"Constellations",desc:"Igniting star patterns into golden line work.",render:()=>`
    <svg viewBox="0 0 260 180" width="100%" height="100%">
      <line x1="40" y1="30" x2="84" y2="58" stroke="#D4AF37" stroke-width="2"/>
      <line x1="84" y1="58" x2="118" y2="84" stroke="#D4AF37" stroke-width="2"/>
      <line x1="118" y1="84" x2="176" y2="58" stroke="#D4AF37" stroke-width="2"/>
      <line x1="118" y1="84" x2="150" y2="132" stroke="#D4AF37" stroke-width="2"/>
      <line x1="150" y1="132" x2="90" y2="126" stroke="#D4AF37" stroke-width="2"/>
      ${[[40,30],[84,58],[118,84],[176,58],[150,132],[90,126]].map(([x,y])=>`<circle cx="${x}" cy="${y}" r="4" fill="#FFF7D0"/>`).join("")}
    </svg>`},
  stars:{title:"Stars",desc:"Brightness and color comparison.",render:()=>`
    <div class="dot" style="left:22%;top:45%;width:28px;height:28px;background:#EAF1FF;box-shadow:0 0 26px #EAF1FF"></div>
    <div class="dot" style="left:46%;top:40%;width:22px;height:22px;background:#9EDCFF;box-shadow:0 0 22px #9EDCFF"></div>
    <div class="dot" style="left:66%;top:50%;width:16px;height:16px;background:#FFD3A8;box-shadow:0 0 18px #FFD3A8"></div>`},
  deep_sky:{title:"Deep Sky",desc:"Nebulae, galaxies, clusters, and remnants as a living layer.",render:()=>`
    <div class="dot" style="left:12%;top:40%;width:120px;height:76px;background:rgba(139,116,255,.45);filter:blur(2px)"></div>
    <div class="dot" style="right:14%;top:22%;width:88px;height:88px;background:rgba(98,207,255,.42);filter:blur(2px)"></div>
    <div class="dot" style="left:48%;bottom:20%;width:72px;height:72px;background:rgba(246,220,145,.28);filter:blur(2px)"></div>
    <div class="dot" style="right:18%;bottom:18%;width:92px;height:64px;background:rgba(255,176,122,.34);filter:blur(2px)"></div>`},
  milky_way:{title:"Milky Way",desc:"Galaxy Mode with the Milky Way band, Galactic Center, and dust lanes.",render:()=>`
    <div class="band"></div>
    <div class="dot" style="left:14%;top:48%;width:12px;height:12px;background:#F6DC91"></div>
    <div style="position:absolute;left:18%;top:46%;color:#fff;font-size:12px;font-weight:800">Galactic Center</div>
    <div style="position:absolute;right:18%;top:58%;color:#C0C6D4;font-size:11px">Great Rift</div>`},
  beginner_path:{title:"30 Nights",desc:"A guided step-by-step beginner course.",render:()=>`
    <div style="position:absolute;left:40px;right:40px;top:110px;display:flex;gap:14px;align-items:center;justify-content:center">
      ${[1,2,3,4,5,6].map((n,i)=>`<div style="width:18px;height:18px;border-radius:9px;background:${i<3?'#F6DC91':'rgba(255,255,255,.08)'}"></div>`).join("")}
    </div>
    <div style="position:absolute;left:50%;top:72px;transform:translateX(-50%);color:#fff;font-weight:900;font-size:26px">Night 3</div>`}
};
let active="solar_system";
function renderSidebar(){
  document.getElementById("side").innerHTML = Object.entries(data).map(([id,v])=>`<div class="item ${active===id?'active':''}" onclick="active='${id}';render()"><b>${v.title}</b><span style="color:#8F99B3;font-size:13px">${v.desc}</span></div>`).join("");
}
function render(){
  renderSidebar();
  const v=data[active];
  document.getElementById("title").innerText=v.title;
  document.getElementById("desc").innerText=v.desc;
  document.getElementById("canvas").innerHTML=v.render();
}
render();
</script></body></html>
